services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-carehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carehub_dev}
      POSTGRES_DB: ${POSTGRES_DB:-carehub}
    ports:
      - '9392:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    init: true
    stop_grace_period: 3s
    env_file: ./packages/backend/.env
    environment:
      DATABASE_URL: postgresql://carehub:carehub_dev@db:5432/carehub
      LOG_FORMAT: json
    depends_on:
      - db

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    ports:
      - '9390:9390'
      - '9393:9393'
    depends_on:
      - backend

volumes:
  postgres_data:
