version: '3.9'

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-carehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carehub_dev}
      POSTGRES_DB: ${POSTGRES_DB:-carehub}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
