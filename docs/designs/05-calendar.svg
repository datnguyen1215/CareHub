  <text x="310" y="192" font-family="system-ui, sans-serif" font-size="20" fill="#4A90D9" text-anchor="middle">&lt;</text>
  <text x="340" y="192" font-family="system-ui, sans-serif" font-size="20" fill="#4A90D9" text-anchor="middle">&gt;</text>

