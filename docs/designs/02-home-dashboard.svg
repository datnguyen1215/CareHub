<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#F5F5F5" rx="20"/>

  <!-- Top bar -->
  <rect width="375" height="96" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="24" y="72" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#333">CareHub</text>
  <!-- User avatar -->
  <circle cx="335" cy="66" r="18" fill="#4A90D9" opacity="0.15"/>
  <text x="335" y="71" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4A90D9" text-anchor="middle">D</text>

  <!-- Section label -->
  <text x="24" y="132" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#888" letter-spacing="0.5">CARE PROFILES</text>

  <!-- Profile card: Grandpa -->
  <rect x="16" y="150" width="167" height="148" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="60" cy="191" r="24" fill="#E8F0FE"/>
  <text x="60" y="197" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle">👴</text>
  <text x="96" y="186" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#333">Grandpa</text>
  <text x="96" y="202" font-family="system-ui, sans-serif" font-size="12" fill="#666">Grandfather</text>
  <!-- Condition tags -->
  <rect x="28" y="224" width="52" height="18" rx="9" fill="#E8F0FE"/>
  <text x="54" y="236" font-family="system-ui, sans-serif" font-size="10" fill="#4A90D9" text-anchor="middle">Diabetes</text>
  <rect x="86" y="224" width="50" height="18" rx="9" fill="#E8F0FE"/>
  <text x="111" y="236" font-family="system-ui, sans-serif" font-size="10" fill="#4A90D9" text-anchor="middle">Hypert.</text>
  <!-- Medication count -->
  <text x="28" y="277" font-family="system-ui, sans-serif" font-size="12" fill="#666">3 medications</text>

  <!-- Profile card: Grandma -->
  <rect x="192" y="150" width="167" height="148" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="236" cy="191" r="24" fill="#FDE8F0"/>
  <text x="236" y="197" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle">👵</text>
  <text x="272" y="186" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#333">Grandma</text>
  <text x="272" y="202" font-family="system-ui, sans-serif" font-size="12" fill="#666">Grandmother</text>
  <!-- Condition tag -->
  <rect x="204" y="224" width="60" height="18" rx="9" fill="#E8F0FE"/>
  <text x="234" y="236" font-family="system-ui, sans-serif" font-size="10" fill="#4A90D9" text-anchor="middle">Arthritis</text>
  <!-- Medication count -->
  <text x="204" y="277" font-family="system-ui, sans-serif" font-size="12" fill="#666">2 medications</text>

  <!-- Profile card: Mom (height=148 matches Grandpa/Grandma row) -->
  <rect x="16" y="314" width="167" height="148" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="60" cy="351" r="24" fill="#E8F0FE"/>
  <text x="60" y="357" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle">👩</text>
  <text x="96" y="346" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#333">Mom</text>
  <text x="96" y="362" font-family="system-ui, sans-serif" font-size="12" fill="#666">Mother</text>
  <!-- No conditions (faint empty-state label) -->
  <text x="28" y="392" font-family="system-ui, sans-serif" font-size="11" fill="#CCCCCC">No conditions</text>
  <!-- Medication count -->
  <text x="28" y="414" font-family="system-ui, sans-serif" font-size="12" fill="#666">1 medication</text>

  <!-- Profile card: Dad (height=148 matches Grandpa/Grandma row) -->
  <rect x="192" y="314" width="167" height="148" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="236" cy="351" r="24" fill="#E8F4E8"/>
  <text x="236" y="357" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle">👨</text>
  <text x="272" y="346" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#333">Dad</text>
  <text x="272" y="362" font-family="system-ui, sans-serif" font-size="12" fill="#666">Father</text>
  <!-- Condition tag -->
  <rect x="204" y="384" width="62" height="18" rx="9" fill="#E8F0FE"/>
  <text x="235" y="396" font-family="system-ui, sans-serif" font-size="10" fill="#4A90D9" text-anchor="middle">Hypert.</text>
  <!-- Medication count -->
  <text x="204" y="414" font-family="system-ui, sans-serif" font-size="12" fill="#666">2 medications</text>

  <!-- Add Profile card — full width, spans both columns for 2-column grid symmetry -->
  <!-- stroke-dasharray border may be clipped by tight shadow filter bounds; widen filter region if rendering issues appear -->
  <rect x="16" y="478" width="343" height="64" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="6 3"/>
  <circle cx="167" cy="510" r="18" fill="#E8F0FE"/>
  <text x="167" y="518" font-family="system-ui, sans-serif" font-size="22" font-weight="300" fill="#4A90D9" text-anchor="middle">+</text>
  <text x="208" y="515" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#4A90D9">Add Profile</text>

  <!-- Bottom nav -->
  <rect x="0" y="732" width="375" height="80" fill="#FFFFFF" filter="url(#shadow)"/>
  <!-- Home (active) -->
  <rect x="40" y="744" width="24" height="18" rx="3" fill="none" stroke="#4A90D9" stroke-width="2"/>
  <line x1="40" y1="750" x2="64" y2="750" stroke="#4A90D9" stroke-width="2"/>
  <text x="52" y="779" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A90D9" text-anchor="middle">Home</text>
  <!-- Devices -->
  <rect x="164" y="744" width="22" height="16" rx="3" fill="none" stroke="#AAA" stroke-width="1.5"/>
  <rect x="170" y="762" width="10" height="2" rx="1" fill="#AAA"/>
  <text x="175" y="779" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" text-anchor="middle">Devices</text>
  <!-- Settings -->
  <circle cx="298" cy="753" r="9" fill="none" stroke="#AAA" stroke-width="1.5"/>
  <circle cx="298" cy="753" r="3" fill="#AAA"/>
  <text x="298" y="779" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" text-anchor="middle">Settings</text>

  <!-- Home indicator -->
  <rect x="140" y="800" width="95" height="5" rx="2.5" fill="#DDD"/>
</svg>
