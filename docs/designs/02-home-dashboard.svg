<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="fabShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4A90D9" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#F5F5F5" rx="20"/>

  <!-- Top bar -->
  <rect width="375" height="96" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="24" y="72" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#333">CareHub</text>
  <!-- User avatar -->
  <circle cx="335" cy="66" r="18" fill="#4A90D9" opacity="0.15"/>
  <text x="335" y="71" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4A90D9" text-anchor="middle">D</text>

  <!-- Section label -->
  <text x="24" y="132" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#888" letter-spacing="0.5">CARE PROFILES</text>

  <!-- Profile card: Grandpa -->
  <rect x="16" y="150" width="167" height="160" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="60" cy="195" r="24" fill="#E8F0FE"/>
  <text x="60" y="201" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle">👴</text>
  <!-- Green status dot -->
  <circle cx="78" cy="178" r="6" fill="#5CB85C"/>
  <circle cx="78" cy="178" r="6" fill="#5CB85C" stroke="#FFFFFF" stroke-width="2"/>
  <text x="96" y="190" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#333">Grandpa</text>
  <text x="96" y="207" font-family="system-ui, sans-serif" font-size="12" fill="#888">Updated 5m ago</text>
  <line x1="32" y1="226" x2="167" y2="226" stroke="#F0F0F0" stroke-width="1"/>
  <text x="32" y="248" font-family="system-ui, sans-serif" font-size="12" fill="#888">BP: 128/82</text>
  <text x="32" y="266" font-family="system-ui, sans-serif" font-size="12" fill="#888">Meds: 3 active</text>
  <text x="32" y="284" font-family="system-ui, sans-serif" font-size="12" fill="#4A90D9">Next: Dr. Nguyen 2PM</text>

  <!-- Profile card: Grandma -->
  <rect x="192" y="150" width="167" height="160" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="236" cy="195" r="24" fill="#FDE8F0"/>
  <text x="236" y="201" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle">👵</text>
  <circle cx="254" cy="178" r="6" fill="#5CB85C" stroke="#FFFFFF" stroke-width="2"/>
  <text x="272" y="190" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#333">Grandma</text>
  <text x="272" y="207" font-family="system-ui, sans-serif" font-size="12" fill="#888">Updated 1h ago</text>
  <line x1="208" y1="226" x2="343" y2="226" stroke="#F0F0F0" stroke-width="1"/>
  <text x="208" y="248" font-family="system-ui, sans-serif" font-size="12" fill="#888">BP: 120/78</text>
  <text x="208" y="266" font-family="system-ui, sans-serif" font-size="12" fill="#888">Meds: 2 active</text>
  <text x="208" y="284" font-family="system-ui, sans-serif" font-size="12" fill="#5CB85C">All good today</text>

  <!-- Profile card: Mom -->
  <rect x="16" y="326" width="167" height="160" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="60" cy="371" r="24" fill="#E8F0FE"/>
  <text x="60" y="377" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle">👩</text>
  <circle cx="78" cy="354" r="6" fill="#5CB85C" stroke="#FFFFFF" stroke-width="2"/>
  <text x="96" y="366" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#333">Mom</text>
  <text x="96" y="383" font-family="system-ui, sans-serif" font-size="12" fill="#888">Updated 3h ago</text>
  <line x1="32" y1="402" x2="167" y2="402" stroke="#F0F0F0" stroke-width="1"/>
  <text x="32" y="424" font-family="system-ui, sans-serif" font-size="12" fill="#888">BP: 118/75</text>
  <text x="32" y="442" font-family="system-ui, sans-serif" font-size="12" fill="#888">Meds: 1 active</text>
  <text x="32" y="460" font-family="system-ui, sans-serif" font-size="12" fill="#5CB85C">All good today</text>

  <!-- Profile card: Dad -->
  <rect x="192" y="326" width="167" height="160" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="236" cy="371" r="24" fill="#E8F4E8"/>
  <text x="236" y="377" font-family="system-ui, sans-serif" font-size="20" text-anchor="middle">👨</text>
  <circle cx="254" cy="354" r="6" fill="#F0AD4E" stroke="#FFFFFF" stroke-width="2"/>
  <text x="272" y="366" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#333">Dad</text>
  <text x="272" y="383" font-family="system-ui, sans-serif" font-size="12" fill="#888">Updated 6h ago</text>
  <line x1="208" y1="402" x2="343" y2="402" stroke="#F0F0F0" stroke-width="1"/>
  <text x="208" y="424" font-family="system-ui, sans-serif" font-size="12" fill="#888">BP: 135/88</text>
  <text x="208" y="442" font-family="system-ui, sans-serif" font-size="12" fill="#F0AD4E">Meds: needs refill</text>
  <text x="208" y="460" font-family="system-ui, sans-serif" font-size="12" fill="#888">No upcoming appt</text>

  <!-- Quick actions section -->
  <text x="24" y="524" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#888" letter-spacing="0.5">QUICK ACTIONS</text>
  <rect x="16" y="540" width="343" height="72" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="32" y="556" width="92" height="40" rx="8" fill="#E8F0FE"/>
  <text x="78" y="581" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#4A90D9" text-anchor="middle">Call Tablet</text>
  <rect x="140" y="556" width="92" height="40" rx="8" fill="#E8F4E8"/>
  <text x="186" y="581" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#5CB85C" text-anchor="middle">Push Photo</text>
  <rect x="248" y="556" width="92" height="40" rx="8" fill="#FFF3E0"/>
  <text x="294" y="581" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#F0AD4E" text-anchor="middle">Add Note</text>

  <!-- FAB -->
  <circle cx="335" cy="670" r="28" fill="#4A90D9" filter="url(#fabShadow)"/>
  <text x="335" y="678" font-family="system-ui, sans-serif" font-size="28" font-weight="300" fill="#FFFFFF" text-anchor="middle">+</text>

  <!-- Bottom nav -->
  <rect x="0" y="732" width="375" height="80" fill="#FFFFFF" filter="url(#shadow)"/>
  <!-- Home (active) -->
  <rect x="40" y="744" width="24" height="18" rx="3" fill="none" stroke="#4A90D9" stroke-width="2"/>
  <line x1="40" y1="750" x2="64" y2="750" stroke="#4A90D9" stroke-width="2"/>
  <text x="52" y="779" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A90D9" text-anchor="middle">Home</text>
  <!-- Devices -->
  <rect x="164" y="744" width="22" height="16" rx="3" fill="none" stroke="#AAA" stroke-width="1.5"/>
  <rect x="170" y="762" width="10" height="2" rx="1" fill="#AAA"/>
  <text x="175" y="779" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" text-anchor="middle">Devices</text>
  <!-- Settings -->
  <circle cx="298" cy="753" r="9" fill="none" stroke="#AAA" stroke-width="1.5"/>
  <circle cx="298" cy="753" r="3" fill="#AAA"/>
  <text x="298" y="779" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" text-anchor="middle">Settings</text>

  <!-- Home indicator -->
  <rect x="140" y="800" width="95" height="5" rx="2.5" fill="#DDD"/>
</svg>