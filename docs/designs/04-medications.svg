<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 812" width="850" height="812">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="modalShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  FRAME 1 — Medication List (375×812)                   -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Background -->
  <rect x="0" y="0" width="375" height="812" fill="#F5F5F5" rx="20"/>

  <!-- Frame label -->
  <text x="12" y="18" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" font-weight="500">FRAME 1 — Medication List</text>

  <!-- Status bar placeholder -->
  <rect x="0" y="0" width="375" height="28" fill="#FFFFFF" rx="20"/>

  <!-- Header -->
  <rect x="0" y="28" width="375" height="56" fill="#FFFFFF" filter="url(#shadow)"/>
  <!-- Back arrow -->
  <polyline points="20,62 32,50" fill="none" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="62" x2="32" y2="74" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round"/>
  <text x="48" y="68" font-family="system-ui, sans-serif" font-size="19" font-weight="700" fill="#333">Medications</text>
  <!-- Add Medication button -->
  <rect x="268" y="44" width="95" height="32" rx="8" fill="#4A90D9"/>
  <text x="315" y="64" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">+ Add Med</text>

  <!-- ── Active medications list ── -->

  <!-- Med 1: Metformin -->
  <rect x="16" y="100" width="343" height="76" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <!-- Name + dosage -->
  <text x="20" y="123" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#333">Metformin</text>
  <text x="107" y="123" font-family="system-ui, sans-serif" font-size="15" fill="#666"> 500mg</text>
  <!-- Schedule chips: Morning, Evening -->
  <rect x="20" y="134" width="66" height="22" rx="11" fill="#E3F0FB"/>
  <text x="53" y="149" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#4A90D9" text-anchor="middle">Morning</text>
  <rect x="92" y="134" width="60" height="22" rx="11" fill="#E3F0FB"/>
  <text x="122" y="149" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#4A90D9" text-anchor="middle">Evening</text>
  <!-- Tap hint -->
  <text x="339" y="144" font-family="system-ui, sans-serif" font-size="18" fill="#CCC" text-anchor="middle">›</text>

  <!-- Med 2: Lisinopril -->
  <rect x="16" y="188" width="343" height="76" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="20" y="211" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#333">Lisinopril</text>
  <text x="99" y="211" font-family="system-ui, sans-serif" font-size="15" fill="#666"> 10mg</text>
  <!-- Schedule chips: Morning -->
  <rect x="20" y="222" width="66" height="22" rx="11" fill="#E3F0FB"/>
  <text x="53" y="237" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#4A90D9" text-anchor="middle">Morning</text>
  <text x="339" y="232" font-family="system-ui, sans-serif" font-size="18" fill="#CCC" text-anchor="middle">›</text>

  <!-- Med 3: Aspirin -->
  <rect x="16" y="276" width="343" height="76" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="20" y="299" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#333">Aspirin</text>
  <text x="76" y="299" font-family="system-ui, sans-serif" font-size="15" fill="#666"> 81mg</text>
  <!-- Schedule chips: Morning, Bedtime -->
  <rect x="20" y="310" width="66" height="22" rx="11" fill="#E3F0FB"/>
  <text x="53" y="325" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#4A90D9" text-anchor="middle">Morning</text>
  <rect x="92" y="310" width="60" height="22" rx="11" fill="#E3F0FB"/>
  <text x="122" y="325" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#4A90D9" text-anchor="middle">Bedtime</text>
  <text x="339" y="320" font-family="system-ui, sans-serif" font-size="18" fill="#CCC" text-anchor="middle">›</text>

  <!-- Med 4: Atorvastatin -->
  <rect x="16" y="364" width="343" height="76" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="20" y="387" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#333">Atorvastatin</text>
  <text x="122" y="387" font-family="system-ui, sans-serif" font-size="15" fill="#666"> 20mg</text>
  <!-- Schedule chips: Bedtime -->
  <rect x="20" y="398" width="60" height="22" rx="11" fill="#E3F0FB"/>
  <text x="50" y="413" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#4A90D9" text-anchor="middle">Bedtime</text>
  <text x="339" y="408" font-family="system-ui, sans-serif" font-size="18" fill="#CCC" text-anchor="middle">›</text>

  <!-- Divider -->
  <line x1="16" y1="456" x2="359" y2="456" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Show discontinued toggle -->
  <text x="24" y="480" font-family="system-ui, sans-serif" font-size="13" fill="#666">Show discontinued</text>
  <!-- Toggle pill (off state) -->
  <rect x="294" y="466" width="44" height="24" rx="12" fill="#CCC"/>
  <circle cx="306" cy="478" r="10" fill="#FFFFFF"/>

  <!-- Discontinued med (dimmed, shown below toggle) -->
  <rect x="16" y="498" width="343" height="76" rx="12" fill="#FFFFFF" filter="url(#shadow)" opacity="0.5"/>
  <text x="20" y="521" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#AAA">Amlodipine</text>
  <text x="110" y="521" font-family="system-ui, sans-serif" font-size="15" fill="#BBB"> 5mg</text>
  <!-- Discontinued badge -->
  <rect x="20" y="532" width="84" height="22" rx="11" fill="#F0F0F0"/>
  <text x="62" y="547" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" text-anchor="middle">Discontinued</text>
  <text x="339" y="542" font-family="system-ui, sans-serif" font-size="18" fill="#CCC" text-anchor="middle">›</text>

  <!-- Annotation: tap → opens edit modal -->
  <line x1="339" y1="144" x2="390" y2="130" stroke="#AAA" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom nav -->
  <rect x="0" y="732" width="375" height="80" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="40" y="744" width="24" height="18" rx="3" fill="none" stroke="#AAA" stroke-width="1.5"/>
  <text x="52" y="779" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" text-anchor="middle">Home</text>
  <rect x="164" y="744" width="22" height="16" rx="3" fill="none" stroke="#AAA" stroke-width="1.5"/>
  <text x="175" y="779" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" text-anchor="middle">Devices</text>
  <circle cx="298" cy="753" r="9" fill="none" stroke="#AAA" stroke-width="1.5"/>
  <text x="298" y="779" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" text-anchor="middle">Settings</text>
  <rect x="140" y="800" width="95" height="5" rx="2.5" fill="#DDD"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!--  FRAME 2 — Add / Edit Modal (375×812, offset x=460)    -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Frame label -->
  <text x="472" y="18" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" font-weight="500">FRAME 2 — Add / Edit Modal</text>

  <!-- Dimmed background (modal overlay) -->
  <rect x="460" y="0" width="375" height="812" fill="#000" opacity="0.35" rx="20"/>

  <!-- Modal card -->
  <rect x="476" y="180" width="343" height="452" rx="16" fill="#FFFFFF" filter="url(#modalShadow)"/>

  <!-- Modal header -->
  <text x="648" y="218" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#333" text-anchor="middle">Edit Medication</text>
  <!-- Close button -->
  <circle cx="800" cy="210" r="14" fill="#F0F0F0"/>
  <line x1="794" y1="204" x2="806" y2="216" stroke="#666" stroke-width="2" stroke-linecap="round"/>
  <line x1="806" y1="204" x2="794" y2="216" stroke="#666" stroke-width="2" stroke-linecap="round"/>

  <!-- Divider -->
  <line x1="476" y1="232" x2="819" y2="232" stroke="#EEE" stroke-width="1"/>

  <!-- Name field -->
  <text x="492" y="258" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#333">Name *</text>
  <rect x="492" y="266" width="311" height="40" rx="8" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="504" y="291" font-family="system-ui, sans-serif" font-size="14" fill="#333">Metformin</text>

  <!-- Dosage field -->
  <text x="492" y="328" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#333">Dosage</text>
  <rect x="492" y="336" width="311" height="40" rx="8" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="504" y="361" font-family="system-ui, sans-serif" font-size="14" fill="#333">500mg</text>

  <!-- Schedule section -->
  <text x="492" y="398" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#333">Schedule</text>
  <!-- Morning chip (selected) -->
  <rect x="492" y="408" width="66" height="28" rx="14" fill="#4A90D9"/>
  <text x="525" y="426" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle">Morning</text>
  <!-- Afternoon chip (unselected) -->
  <rect x="566" y="408" width="74" height="28" rx="14" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="603" y="426" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#666" text-anchor="middle">Afternoon</text>
  <!-- Evening chip (selected) -->
  <rect x="648" y="408" width="62" height="28" rx="14" fill="#4A90D9"/>
  <text x="679" y="426" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle">Evening</text>
  <!-- Bedtime chip (unselected) -->
  <rect x="718" y="408" width="62" height="28" rx="14" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="749" y="426" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#666" text-anchor="middle">Bedtime</text>

  <!-- Status toggle (edit mode only) -->
  <text x="492" y="466" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#333">Status</text>
  <text x="492" y="484" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" font-style="italic">(edit mode only)</text>
  <!-- Active tab (selected) -->
  <rect x="492" y="492" width="80" height="32" rx="8" fill="#5CB85C"/>
  <text x="532" y="512" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">Active</text>
  <!-- Discontinued tab -->
  <rect x="578" y="492" width="104" height="32" rx="8" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="630" y="512" font-family="system-ui, sans-serif" font-size="13" fill="#666" text-anchor="middle">Discontinued</text>

  <!-- Divider above save -->
  <line x1="476" y1="546" x2="819" y2="546" stroke="#EEE" stroke-width="1"/>

  <!-- Save button -->
  <rect x="492" y="560" width="311" height="48" rx="12" fill="#4A90D9"/>
  <text x="648" y="590" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Save</text>

  <!-- Annotation: tap chip to toggle -->
  <text x="648" y="452" font-family="system-ui, sans-serif" font-size="10" fill="#AAA" text-anchor="middle">tap to toggle · multi-select</text>

  <!-- Arrow connecting Frame 1 tap → Frame 2 modal -->
  <line x1="359" y1="232" x2="460" y2="320" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4A90D9"/>
    </marker>
  </defs>
  <text x="400" y="285" font-family="system-ui, sans-serif" font-size="10" fill="#4A90D9" text-anchor="middle" transform="rotate(-32, 400, 285)">tap item</text>

</svg>
