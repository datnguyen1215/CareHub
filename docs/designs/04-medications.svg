<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="fabShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4A90D9" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#F5F5F5" rx="20"/>

  <!-- Top bar -->
  <rect width="375" height="96" fill="#FFFFFF" filter="url(#shadow)"/>
  <polyline points="20,66 32,54" fill="none" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="66" x2="32" y2="78" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round"/>
  <text x="48" y="72" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#333">Grandpa</text>

  <!-- Tab bar -->
  <rect x="0" y="96" width="375" height="48" fill="#FFFFFF"/>
  <text x="52" y="125" font-family="system-ui, sans-serif" font-size="14" fill="#888" text-anchor="middle">Overview</text>
  <text x="145" y="125" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4A90D9" text-anchor="middle">Meds</text>
  <rect x="113" y="138" width="64" height="3" rx="1.5" fill="#4A90D9"/>
  <text x="230" y="125" font-family="system-ui, sans-serif" font-size="14" fill="#888" text-anchor="middle">Calendar</text>
  <text x="325" y="125" font-family="system-ui, sans-serif" font-size="14" fill="#888" text-anchor="middle">Documents</text>
  <line x1="0" y1="144" x2="375" y2="144" stroke="#EEE" stroke-width="1"/>

  <!-- Section: Active medications -->
  <text x="24" y="175" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#5CB85C" letter-spacing="0.5">ACTIVE</text>

  <!-- Med 1 -->
  <rect x="16" y="188" width="343" height="88" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="48" cy="220" r="20" fill="#E8F4E8"/>
  <text x="48" y="226" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">💊</text>
  <text x="80" y="213" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#333">Lisinopril</text>
  <text x="80" y="232" font-family="system-ui, sans-serif" font-size="13" fill="#666">10mg tablet</text>
  <text x="80" y="252" font-family="system-ui, sans-serif" font-size="12" fill="#888">Once daily, morning</text>
  <!-- Time badge -->
  <rect x="280" y="206" width="64" height="28" rx="14" fill="#E8F4E8"/>
  <text x="312" y="224" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#5CB85C" text-anchor="middle">8:00 AM</text>
  <circle cx="340" cy="256" r="5" fill="#5CB85C"/>

  <!-- Med 2 -->
  <rect x="16" y="290" width="343" height="88" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="48" cy="322" r="20" fill="#E8F4E8"/>
  <text x="48" y="328" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">💊</text>
  <text x="80" y="315" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#333">Metformin</text>
  <text x="80" y="334" font-family="system-ui, sans-serif" font-size="13" fill="#666">500mg tablet</text>
  <text x="80" y="354" font-family="system-ui, sans-serif" font-size="12" fill="#888">Twice daily, with meals</text>
  <rect x="262" y="308" width="82" height="28" rx="14" fill="#E8F4E8"/>
  <text x="303" y="326" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#5CB85C" text-anchor="middle">8AM / 6PM</text>
  <circle cx="340" cy="358" r="5" fill="#5CB85C"/>

  <!-- Med 3 -->
  <rect x="16" y="392" width="343" height="88" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="48" cy="424" r="20" fill="#FFF3E0"/>
  <text x="48" y="430" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">💊</text>
  <text x="80" y="417" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#333">Aspirin</text>
  <text x="80" y="436" font-family="system-ui, sans-serif" font-size="13" fill="#666">81mg tablet (low dose)</text>
  <text x="80" y="456" font-family="system-ui, sans-serif" font-size="12" fill="#888">Once daily, morning</text>
  <rect x="280" y="410" width="64" height="28" rx="14" fill="#FFF3E0"/>
  <text x="312" y="428" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#F0AD4E" text-anchor="middle">8:00 AM</text>
  <circle cx="340" cy="460" r="5" fill="#5CB85C"/>

  <!-- Med 4 -->
  <rect x="16" y="494" width="343" height="88" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="48" cy="526" r="20" fill="#E8F0FE"/>
  <text x="48" y="532" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle">💊</text>
  <text x="80" y="519" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#333">Atorvastatin</text>
  <text x="80" y="538" font-family="system-ui, sans-serif" font-size="13" fill="#666">20mg tablet</text>
  <text x="80" y="558" font-family="system-ui, sans-serif" font-size="12" fill="#888">Once daily, evening</text>
  <rect x="274" y="512" width="70" height="28" rx="14" fill="#E8F0FE"/>
  <text x="309" y="530" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#4A90D9" text-anchor="middle">9:00 PM</text>
  <circle cx="340" cy="562" r="5" fill="#5CB85C"/>

  <!-- Section: Discontinued -->
  <text x="24" y="614" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#AAA" letter-spacing="0.5">DISCONTINUED</text>

  <!-- Discontinued med -->
  <rect x="16" y="627" width="343" height="72" rx="12" fill="#FFFFFF" filter="url(#shadow)" opacity="0.7"/>
  <circle cx="48" cy="655" r="20" fill="#F0F0F0"/>
  <text x="48" y="661" font-family="system-ui, sans-serif" font-size="18" text-anchor="middle" opacity="0.5">💊</text>
  <text x="80" y="650" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#AAA">Amlodipine</text>
  <text x="80" y="669" font-family="system-ui, sans-serif" font-size="13" fill="#CCC">5mg - Stopped Mar 10</text>
  <rect x="274" y="644" width="74" height="24" rx="12" fill="#F0F0F0"/>
  <text x="311" y="660" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" text-anchor="middle">Discontinued</text>

  <!-- FAB -->
  <circle cx="335" cy="670" r="28" fill="#4A90D9" filter="url(#fabShadow)"/>
  <text x="335" y="678" font-family="system-ui, sans-serif" font-size="28" font-weight="300" fill="#FFFFFF" text-anchor="middle">+</text>

  <!-- Bottom nav -->
  <rect x="0" y="732" width="375" height="80" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="40" y="744" width="24" height="18" rx="3" fill="none" stroke="#AAA" stroke-width="1.5"/>
  <text x="52" y="779" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" text-anchor="middle">Home</text>
  <rect x="164" y="744" width="22" height="16" rx="3" fill="none" stroke="#AAA" stroke-width="1.5"/>
  <text x="175" y="779" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" text-anchor="middle">Devices</text>
  <circle cx="298" cy="753" r="9" fill="none" stroke="#AAA" stroke-width="1.5"/>
  <text x="298" y="779" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" text-anchor="middle">Settings</text>

  <rect x="140" y="800" width="95" height="5" rx="2.5" fill="#DDD"/>
</svg>