<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#F5F5F5" rx="20"/>

  <!-- Top bar -->
  <rect width="375" height="96" fill="#FFFFFF" filter="url(#shadow)"/>
  <polyline points="20,66 32,54" fill="none" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="66" x2="32" y2="78" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round"/>
  <text x="48" y="72" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#333">Pair Tablet</text>

  <!-- Step indicator -->
  <rect x="16" y="112" width="343" height="60" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <!-- Step 1 (active) -->
  <circle cx="80" cy="142" r="16" fill="#4A90D9"/>
  <text x="80" y="147" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <!-- Line connector -->
  <line x1="96" y1="142" x2="172" y2="142" stroke="#DDD" stroke-width="2"/>
  <!-- Step 2 (upcoming) -->
  <circle cx="188" cy="142" r="16" fill="#E8E8E8"/>
  <text x="188" y="147" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#AAA" text-anchor="middle">2</text>
  <!-- Line connector -->
  <line x1="204" y1="142" x2="280" y2="142" stroke="#DDD" stroke-width="2"/>
  <!-- Step 3 (upcoming) -->
  <circle cx="296" cy="142" r="16" fill="#E8E8E8"/>
  <text x="296" y="147" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#AAA" text-anchor="middle">3</text>

  <!-- Step labels -->
  <text x="80" y="170" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4A90D9" text-anchor="middle">Scan QR</text>
  <text x="188" y="170" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" text-anchor="middle">Profiles</text>
  <text x="296" y="170" font-family="system-ui, sans-serif" font-size="11" fill="#AAA" text-anchor="middle">Confirm</text>

  <!-- Camera viewfinder -->
  <rect x="32" y="200" width="311" height="320" rx="16" fill="#1A1A1A"/>
  <!-- Corner brackets -->
  <!-- Top left -->
  <path d="M 60,228 L 60,244 M 60,228 L 76,228" fill="none" stroke="#4A90D9" stroke-width="3" stroke-linecap="round"/>
  <!-- Top right -->
  <path d="M 315,228 L 315,244 M 315,228 L 299,228" fill="none" stroke="#4A90D9" stroke-width="3" stroke-linecap="round"/>
  <!-- Bottom left -->
  <path d="M 60,492 L 60,476 M 60,492 L 76,492" fill="none" stroke="#4A90D9" stroke-width="3" stroke-linecap="round"/>
  <!-- Bottom right -->
  <path d="M 315,492 L 315,476 M 315,492 L 299,492" fill="none" stroke="#4A90D9" stroke-width="3" stroke-linecap="round"/>
  <!-- QR scan target area -->
  <rect x="120" y="296" width="135" height="135" rx="8" fill="none" stroke="#4A90D9" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  <!-- Scanning line animation hint -->
  <rect x="130" y="360" width="115" height="2" rx="1" fill="#4A90D9" opacity="0.8"/>
  <!-- Camera label -->
  <text x="187" y="260" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">Position QR code in frame</text>

  <!-- Instructions below camera -->
  <text x="187" y="556" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#333" text-anchor="middle">Scan QR Code</text>
  <text x="187" y="580" font-family="system-ui, sans-serif" font-size="14" fill="#888" text-anchor="middle">Point your camera at the QR code</text>
  <text x="187" y="600" font-family="system-ui, sans-serif" font-size="14" fill="#888" text-anchor="middle">displayed on the tablet</text>

  <!-- Upcoming steps (dimmed) -->
  <rect x="16" y="632" width="343" height="52" rx="12" fill="#FFFFFF" filter="url(#shadow)" opacity="0.5"/>
  <circle cx="40" cy="658" r="10" fill="#E8E8E8"/>
  <text x="40" y="662" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#AAA" text-anchor="middle">2</text>
  <text x="60" y="654" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#AAA">Choose profiles for this tablet</text>
  <text x="60" y="672" font-family="system-ui, sans-serif" font-size="12" fill="#CCC">Select which care profiles to show</text>

  <rect x="16" y="696" width="343" height="52" rx="12" fill="#FFFFFF" filter="url(#shadow)" opacity="0.3"/>
  <circle cx="40" cy="722" r="10" fill="#E8E8E8"/>
  <text x="40" y="726" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#CCC" text-anchor="middle">3</text>
  <text x="60" y="718" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#CCC">Confirm and finish pairing</text>
  <text x="60" y="736" font-family="system-ui, sans-serif" font-size="12" fill="#DDD">Review settings before connecting</text>

  <!-- Home indicator -->
  <rect x="140" y="790" width="95" height="5" rx="2.5" fill="#DDD"/>
</svg>