<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#F5F5F5" rx="20"/>

  <!-- Status bar -->
  <rect width="375" height="44" fill="#FFFFFF"/>
  <text x="187" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#333" text-anchor="middle">9:41</text>

  <!-- Logo area -->
  <circle cx="187" cy="160" r="40" fill="#4A90D9" opacity="0.12"/>
  <text x="187" y="153" font-family="system-ui, sans-serif" font-size="24" font-weight="300" fill="#4A90D9" text-anchor="middle">+</text>
  <text x="187" y="170" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#4A90D9" text-anchor="middle" letter-spacing="1">CARE</text>

  <!-- Title -->
  <text x="187" y="240" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#333333" text-anchor="middle">Check your email</text>

  <!-- Subtitle -->
  <text x="187" y="272" font-family="system-ui, sans-serif" font-size="15" fill="#666666" text-anchor="middle">We sent a 6-digit code to</text>
  <text x="187" y="293" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#333333" text-anchor="middle">your@email.com</text>

  <!-- 6-digit code input boxes -->
  <!-- Box 1 -->
  <rect x="24" y="330" width="46" height="56" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <!-- Box 2 -->
  <rect x="79" y="330" width="46" height="56" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <!-- Box 3 -->
  <rect x="134" y="330" width="46" height="56" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <!-- Box 4 -->
  <rect x="189" y="330" width="46" height="56" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <!-- Box 5 -->
  <rect x="244" y="330" width="46" height="56" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <!-- Box 6 -->
  <rect x="299" y="330" width="52" height="56" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>

  <!-- Placeholder dashes in boxes -->
  <text x="47" y="364" font-family="system-ui, sans-serif" font-size="22" fill="#CCC" text-anchor="middle">–</text>
  <text x="102" y="364" font-family="system-ui, sans-serif" font-size="22" fill="#CCC" text-anchor="middle">–</text>
  <text x="157" y="364" font-family="system-ui, sans-serif" font-size="22" fill="#CCC" text-anchor="middle">–</text>
  <text x="212" y="364" font-family="system-ui, sans-serif" font-size="22" fill="#CCC" text-anchor="middle">–</text>
  <text x="267" y="364" font-family="system-ui, sans-serif" font-size="22" fill="#CCC" text-anchor="middle">–</text>
  <text x="325" y="364" font-family="system-ui, sans-serif" font-size="22" fill="#CCC" text-anchor="middle">–</text>

  <!-- Verify button -->
  <rect x="24" y="420" width="327" height="56" rx="12" fill="#4A90D9"/>
  <text x="187" y="453" font-family="system-ui, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF" text-anchor="middle">Verify</text>

  <!-- Resend code link (disabled with countdown) -->
  <text x="187" y="508" font-family="system-ui, sans-serif" font-size="14" fill="#AAA" text-anchor="middle">Resend code (60s)</text>

  <!-- Use different email link -->
  <text x="187" y="560" font-family="system-ui, sans-serif" font-size="14" fill="#4A90D9" text-anchor="middle">Use a different email</text>

  <!-- Home indicator -->
  <rect x="140" y="790" width="95" height="5" rx="2.5" fill="#DDD"/>
</svg>
