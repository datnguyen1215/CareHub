<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 530" width="800" height="530">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="photoShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="800" height="530" fill="#F5F5F5" rx="16"/>

  <!-- Top bar -->
  <rect width="800" height="64" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="32" y="42" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#4A90D9">CareHub</text>
  <!-- Online indicator -->
  <circle cx="738" cy="32" r="6" fill="#5CB85C"/>
  <text x="724" y="37" font-family="system-ui, sans-serif" font-size="13" fill="#5CB85C" text-anchor="end">Connected</text>
  <!-- Settings gear -->
  <circle cx="770" cy="32" r="12" fill="#F5F5F5"/>
  <circle cx="770" cy="32" r="5" fill="none" stroke="#AAA" stroke-width="1.5"/>

  <!-- Main greeting section -->
  <text x="400" y="116" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#333" text-anchor="middle">Good morning, Grandpa!</text>
  <text x="400" y="150" font-family="system-ui, sans-serif" font-size="22" fill="#888" text-anchor="middle">Thursday, March 26, 2026 -- 9:41 AM</text>

  <!-- Caretaker cards row -->
  <!-- Caretaker 1: David -->
  <rect x="32" y="180" width="230" height="140" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="82" cy="230" r="36" fill="#E8F0FE"/>
  <text x="82" y="238" font-family="system-ui, sans-serif" font-size="28" text-anchor="middle">👨</text>
  <text x="160" y="220" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#333">David</text>
  <text x="160" y="242" font-family="system-ui, sans-serif" font-size="14" fill="#888">Your grandson</text>
  <!-- Large call button -->
  <rect x="50" y="278" width="194" height="32" rx="16" fill="#5CB85C"/>
  <text x="147" y="299" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle">Call David</text>

  <!-- Caretaker 2: Sarah -->
  <rect x="285" y="180" width="230" height="140" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="335" cy="230" r="36" fill="#FDE8F0"/>
  <text x="335" y="238" font-family="system-ui, sans-serif" font-size="28" text-anchor="middle">👩</text>
  <text x="413" y="220" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#333">Sarah</text>
  <text x="413" y="242" font-family="system-ui, sans-serif" font-size="14" fill="#888">Your daughter</text>
  <rect x="303" y="278" width="194" height="32" rx="16" fill="#5CB85C"/>
  <text x="400" y="299" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle">Call Sarah</text>

  <!-- Caretaker 3: Michael -->
  <rect x="538" y="180" width="230" height="140" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="588" cy="230" r="36" fill="#E8F4E8"/>
  <text x="588" y="238" font-family="system-ui, sans-serif" font-size="28" text-anchor="middle">👨</text>
  <text x="666" y="220" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#333">Michael</text>
  <text x="666" y="242" font-family="system-ui, sans-serif" font-size="14" fill="#888">Your son</text>
  <rect x="556" y="278" width="194" height="32" rx="16" fill="#5CB85C"/>
  <text x="653" y="299" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle">Call Michael</text>

  <!-- Bottom section: appointment + shared content -->
  <!-- Appointment reminder -->
  <rect x="32" y="344" width="370" height="160" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="32" y="344" width="8" height="160" rx="4" fill="#4A90D9"/>
  <text x="60" y="376" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#888" letter-spacing="0.5">TODAY'S SCHEDULE</text>
  <text x="60" y="412" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#333">Dr. Nguyen</text>
  <text x="60" y="440" font-family="system-ui, sans-serif" font-size="18" fill="#666">Cardiology Check-up</text>
  <text x="60" y="468" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#4A90D9">2:00 PM</text>
  <text x="60" y="492" font-family="system-ui, sans-serif" font-size="14" fill="#888">Heart Health Clinic</text>

  <!-- Shared content area -->
  <rect x="424" y="344" width="344" height="160" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="448" y="376" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#888" letter-spacing="0.5">SHARED BY FAMILY</text>
  <!-- Photo placeholder -->
  <rect x="448" y="392" width="296" height="96" rx="8" fill="#E8F0FE"/>
  <rect x="480" y="408" width="80" height="64" rx="6" fill="#D0E0F5"/>
  <text x="520" y="445" font-family="system-ui, sans-serif" font-size="14" fill="#4A90D9" text-anchor="middle">Family</text>
  <text x="520" y="462" font-family="system-ui, sans-serif" font-size="14" fill="#4A90D9" text-anchor="middle">Photo</text>
  <text x="600" y="440" font-family="system-ui, sans-serif" font-size="16" fill="#444">"Sunday lunch at</text>
  <text x="600" y="460" font-family="system-ui, sans-serif" font-size="16" fill="#444">the park!"</text>
  <text x="600" y="480" font-family="system-ui, sans-serif" font-size="12" fill="#888">From David, yesterday</text>
</svg>