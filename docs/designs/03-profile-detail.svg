<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#F5F5F5" rx="20"/>

  <!-- Top bar -->
  <rect width="375" height="96" fill="#FFFFFF" filter="url(#shadow)"/>
  <!-- Back arrow -->
  <polyline points="20,66 32,54 20,66 32,78" fill="none" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="20" y1="66" x2="32" y2="54" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="66" x2="32" y2="78" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round"/>
  <text x="48" y="72" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#333">Grandpa</text>
  <circle cx="335" cy="66" r="6" fill="#5CB85C"/>
  <text x="320" y="70" font-family="system-ui, sans-serif" font-size="12" fill="#5CB85C" text-anchor="end">Online</text>

  <!-- Tab bar -->
  <rect x="0" y="96" width="375" height="48" fill="#FFFFFF"/>
  <text x="52" y="125" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4A90D9" text-anchor="middle">Overview</text>
  <rect x="20" y="138" width="64" height="3" rx="1.5" fill="#4A90D9"/>
  <text x="145" y="125" font-family="system-ui, sans-serif" font-size="14" fill="#888" text-anchor="middle">Meds</text>
  <text x="230" y="125" font-family="system-ui, sans-serif" font-size="14" fill="#888" text-anchor="middle">Calendar</text>
  <text x="325" y="125" font-family="system-ui, sans-serif" font-size="14" fill="#888" text-anchor="middle">Documents</text>
  <line x1="0" y1="144" x2="375" y2="144" stroke="#EEE" stroke-width="1"/>

  <!-- Health Summary Card -->
  <rect x="16" y="160" width="343" height="130" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="32" y="188" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#333">Health Summary</text>
  <line x1="32" y1="200" x2="343" y2="200" stroke="#F0F0F0" stroke-width="1"/>
  <!-- BP -->
  <circle cx="48" cy="224" r="8" fill="#E8F0FE"/>
  <text x="48" y="228" font-family="system-ui, sans-serif" font-size="10" fill="#4A90D9" text-anchor="middle">BP</text>
  <text x="68" y="220" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333">Blood Pressure</text>
  <text x="68" y="236" font-family="system-ui, sans-serif" font-size="12" fill="#888">128/82 mmHg</text>
  <text x="335" y="228" font-family="system-ui, sans-serif" font-size="12" fill="#5CB85C" text-anchor="end">Normal</text>
  <!-- Weight -->
  <circle cx="48" cy="260" r="8" fill="#FDE8F0"/>
  <text x="48" y="264" font-family="system-ui, sans-serif" font-size="10" fill="#D9534F" text-anchor="middle">W</text>
  <text x="68" y="256" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333">Weight</text>
  <text x="68" y="272" font-family="system-ui, sans-serif" font-size="12" fill="#888">165 lbs (stable)</text>
  <text x="335" y="264" font-family="system-ui, sans-serif" font-size="12" fill="#5CB85C" text-anchor="end">Stable</text>

  <!-- Recent Medications Card -->
  <rect x="16" y="306" width="343" height="145" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="32" y="334" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#333">Recent Medications</text>
  <text x="335" y="334" font-family="system-ui, sans-serif" font-size="13" fill="#4A90D9" text-anchor="end">See all</text>
  <line x1="32" y1="346" x2="343" y2="346" stroke="#F0F0F0" stroke-width="1"/>
  <!-- Med 1 -->
  <circle cx="44" cy="370" r="12" fill="#E8F4E8"/>
  <text x="44" y="374" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">💊</text>
  <text x="66" y="366" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333">Lisinopril</text>
  <text x="66" y="382" font-family="system-ui, sans-serif" font-size="12" fill="#888">10mg - Once daily</text>
  <circle cx="335" cy="370" r="5" fill="#5CB85C"/>
  <!-- Med 2 -->
  <circle cx="44" cy="408" r="12" fill="#E8F4E8"/>
  <text x="44" y="412" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">💊</text>
  <text x="66" y="404" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333">Metformin</text>
  <text x="66" y="420" font-family="system-ui, sans-serif" font-size="12" fill="#888">500mg - Twice daily</text>
  <circle cx="335" cy="408" r="5" fill="#5CB85C"/>
  <!-- Med 3 -->
  <circle cx="44" cy="436" r="12" fill="#FFF3E0"/>
  <text x="44" y="440" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">💊</text>
  <text x="66" y="432" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333">Aspirin</text>
  <text x="66" y="448" font-family="system-ui, sans-serif" font-size="12" fill="#888">81mg - Once daily</text>
  <circle cx="335" cy="436" r="5" fill="#5CB85C"/>

  <!-- Upcoming Appointments Card -->
  <rect x="16" y="467" width="343" height="120" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="32" y="495" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#333">Upcoming Appointments</text>
  <text x="335" y="495" font-family="system-ui, sans-serif" font-size="13" fill="#4A90D9" text-anchor="end">See all</text>
  <line x1="32" y1="507" x2="343" y2="507" stroke="#F0F0F0" stroke-width="1"/>
  <!-- Appt 1 -->
  <rect x="32" y="518" width="4" height="28" rx="2" fill="#4A90D9"/>
  <text x="48" y="533" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333">Dr. Nguyen - Cardiology</text>
  <text x="48" y="549" font-family="system-ui, sans-serif" font-size="12" fill="#888">Today, 2:00 PM</text>
  <!-- Appt 2 -->
  <rect x="32" y="558" width="4" height="28" rx="2" fill="#F0AD4E"/>
  <text x="48" y="573" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333">Lab Work - Quest Diagnostics</text>
  <text x="48" y="589" font-family="system-ui, sans-serif" font-size="12" fill="#888">Thu, Mar 28, 9:00 AM</text>

  <!-- Recent Documents Card -->
  <rect x="16" y="603" width="343" height="100" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="32" y="631" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#333">Recent Documents</text>
  <text x="335" y="631" font-family="system-ui, sans-serif" font-size="13" fill="#4A90D9" text-anchor="end">See all</text>
  <line x1="32" y1="643" x2="343" y2="643" stroke="#F0F0F0" stroke-width="1"/>
  <!-- Doc thumbnails -->
  <rect x="32" y="653" width="44" height="36" rx="4" fill="#E8F0FE"/>
  <text x="54" y="675" font-family="system-ui, sans-serif" font-size="9" fill="#4A90D9" text-anchor="middle">PDF</text>
  <text x="86" y="670" font-family="system-ui, sans-serif" font-size="12" fill="#333">Lab Results</text>
  <text x="86" y="685" font-family="system-ui, sans-serif" font-size="11" fill="#888">Mar 20</text>
  <rect x="190" y="653" width="44" height="36" rx="4" fill="#E8F4E8"/>
  <text x="212" y="675" font-family="system-ui, sans-serif" font-size="9" fill="#5CB85C" text-anchor="middle">IMG</text>
  <text x="244" y="670" font-family="system-ui, sans-serif" font-size="12" fill="#333">Prescription</text>
  <text x="244" y="685" font-family="system-ui, sans-serif" font-size="11" fill="#888">Mar 18</text>

  <!-- Bottom action buttons -->
  <rect x="16" y="720" width="167" height="48" rx="12" fill="#4A90D9"/>
  <text x="100" y="749" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">Call Tablet</text>
  <rect x="192" y="720" width="167" height="48" rx="12" fill="#5CB85C"/>
  <text x="275" y="749" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">Push to Tablet</text>

  <!-- Home indicator -->
  <rect x="140" y="790" width="95" height="5" rx="2.5" fill="#DDD"/>
</svg>