<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#F5F5F5" rx="20"/>

  <!-- Top bar -->
  <rect width="375" height="96" fill="#FFFFFF" filter="url(#shadow)"/>
  <!-- Back arrow -->
  <line x1="20" y1="66" x2="32" y2="54" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="66" x2="32" y2="78" stroke="#4A90D9" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Profile name -->
  <text x="48" y="72" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#333333">Grandpa</text>
  <!-- Edit button (pencil icon) -->
  <line x1="343" y1="76" x2="355" y2="64" stroke="#4A90D9" stroke-width="2" stroke-linecap="round"/>
  <line x1="343" y1="76" x2="339" y2="78" stroke="#4A90D9" stroke-width="2" stroke-linecap="round"/>
  <line x1="355" y1="64" x2="351" y2="60" stroke="#4A90D9" stroke-width="2" stroke-linecap="round"/>
  <line x1="351" y1="60" x2="343" y2="76" stroke="#4A90D9" stroke-width="2" stroke-linecap="round"/>

  <!-- Tab bar — 2 tabs only: Overview + Meds -->
  <rect x="0" y="96" width="375" height="48" fill="#FFFFFF"/>
  <text x="94" y="125" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4A90D9" text-anchor="middle">Overview</text>
  <rect x="46" y="138" width="96" height="3" rx="1.5" fill="#4A90D9"/>
  <text x="281" y="125" font-family="system-ui, sans-serif" font-size="14" fill="#888888" text-anchor="middle">Meds</text>
  <line x1="0" y1="144" x2="375" y2="144" stroke="#EEEEEE" stroke-width="1"/>

  <!-- Profile Info Card -->
  <rect x="16" y="160" width="343" height="148" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="32" y="188" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#333333">Profile Info</text>
  <line x1="32" y1="200" x2="343" y2="200" stroke="#F0F0F0" stroke-width="1"/>
  <!-- Name row -->
  <text x="32" y="222" font-family="system-ui, sans-serif" font-size="12" fill="#666666">Name</text>
  <text x="180" y="222" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333333">Robert Johnson</text>
  <!-- Relationship row -->
  <text x="32" y="244" font-family="system-ui, sans-serif" font-size="12" fill="#666666">Relationship</text>
  <text x="180" y="244" font-family="system-ui, sans-serif" font-size="13" fill="#333333">Grandfather</text>
  <!-- Date of birth row -->
  <text x="32" y="266" font-family="system-ui, sans-serif" font-size="12" fill="#666666">Date of Birth</text>
  <text x="180" y="266" font-family="system-ui, sans-serif" font-size="13" fill="#333333">Jan 5, 1945</text>
  <!-- Conditions label -->
  <text x="32" y="288" font-family="system-ui, sans-serif" font-size="12" fill="#666666">Conditions</text>
  <!-- Condition badges -->
  <rect x="180" y="276" width="62" height="18" rx="9" fill="#E8F0FE"/>
  <text x="211" y="289" font-family="system-ui, sans-serif" font-size="10" fill="#4A90D9" text-anchor="middle">Hypertension</text>
  <rect x="248" y="276" width="52" height="18" rx="9" fill="#E8F0FE"/>
  <text x="274" y="289" font-family="system-ui, sans-serif" font-size="10" fill="#4A90D9" text-anchor="middle">Diabetes</text>
  <rect x="306" y="276" width="42" height="18" rx="9" fill="#E8F0FE"/>
  <text x="327" y="289" font-family="system-ui, sans-serif" font-size="10" fill="#4A90D9" text-anchor="middle">Cardiac</text>

  <!-- Recent Medications Card -->
  <rect x="16" y="324" width="343" height="162" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="32" y="352" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#333333">Recent Medications</text>
  <text x="343" y="352" font-family="system-ui, sans-serif" font-size="13" fill="#4A90D9" text-anchor="end">See all</text>
  <line x1="32" y1="364" x2="343" y2="364" stroke="#F0F0F0" stroke-width="1"/>
  <!-- Med 1 -->
  <circle cx="44" cy="388" r="12" fill="#E8F4E8"/>
  <text x="44" y="392" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">💊</text>
  <text x="66" y="384" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333333">Lisinopril</text>
  <text x="66" y="400" font-family="system-ui, sans-serif" font-size="12" fill="#666666">10mg · Once daily</text>
  <circle cx="343" cy="388" r="5" fill="#5CB85C"/>
  <!-- Med 2 -->
  <circle cx="44" cy="426" r="12" fill="#E8F4E8"/>
  <text x="44" y="430" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">💊</text>
  <text x="66" y="422" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333333">Metformin</text>
  <text x="66" y="438" font-family="system-ui, sans-serif" font-size="12" fill="#666666">500mg · Twice daily</text>
  <circle cx="343" cy="426" r="5" fill="#5CB85C"/>
  <!-- Med 3 -->
  <circle cx="44" cy="464" r="12" fill="#FFF3E0"/>
  <text x="44" y="468" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">💊</text>
  <text x="66" y="460" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333333">Aspirin</text>
  <text x="66" y="476" font-family="system-ui, sans-serif" font-size="12" fill="#666666">81mg · Once daily</text>
  <circle cx="343" cy="464" r="5" fill="#5CB85C"/>

  <!-- Home indicator -->
  <rect x="140" y="790" width="95" height="5" rx="2.5" fill="#DDDDDD"/>
</svg>
