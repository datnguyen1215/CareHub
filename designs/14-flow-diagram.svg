<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90D9"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5CB85C"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="#FAFAFA" rx="12"/>

  <!-- Title -->
  <text x="500" y="36" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#333" text-anchor="middle">CareHub - User Flow Diagram</text>

  <!-- Legend -->
  <rect x="30" y="52" width="240" height="36" rx="8" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="42" y="62" width="14" height="14" rx="3" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="62" y="74" font-family="system-ui, sans-serif" font-size="11" fill="#666">Mobile Portal</text>
  <rect x="140" y="62" width="14" height="14" rx="3" fill="#E8F4E8" stroke="#5CB85C" stroke-width="1.5"/>
  <text x="160" y="74" font-family="system-ui, sans-serif" font-size="11" fill="#666">Tablet Kiosk</text>

  <!-- ========== MOBILE PORTAL SECTION (Blue) ========== -->
  <!-- Section background -->
  <rect x="20" y="96" width="620" height="584" rx="12" fill="#E8F0FE" opacity="0.3"/>
  <text x="40" y="120" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#4A90D9" letter-spacing="1">MOBILE PORTAL</text>

  <!-- Login -->
  <rect x="60" y="140" width="140" height="52" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#4A90D9" stroke-width="2"/>
  <text x="130" y="163" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#333" text-anchor="middle">Login</text>
  <text x="130" y="180" font-family="system-ui, sans-serif" font-size="10" fill="#888" text-anchor="middle">Magic link / Google</text>

  <!-- Arrow: Login -> Home -->
  <line x1="200" y1="166" x2="268" y2="166" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Home Dashboard -->
  <rect x="270" y="136" width="160" height="60" rx="10" fill="#4A90D9" filter="url(#shadow)"/>
  <text x="350" y="163" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Home Dashboard</text>
  <text x="350" y="182" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Profile grid + quick actions</text>

  <!-- Arrow: Home -> Profile Detail -->
  <line x1="350" y1="196" x2="350" y2="244" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="360" y="224" font-family="system-ui, sans-serif" font-size="10" fill="#4A90D9">tap profile</text>

  <!-- Profile Detail -->
  <rect x="270" y="246" width="160" height="52" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#4A90D9" stroke-width="2"/>
  <text x="350" y="269" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#333" text-anchor="middle">Profile Detail</text>
  <text x="350" y="286" font-family="system-ui, sans-serif" font-size="10" fill="#888" text-anchor="middle">Overview + tabs</text>

  <!-- Tab destinations -->
  <!-- Medications -->
  <rect x="60" y="340" width="120" height="44" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="120" y="367" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333" text-anchor="middle">Medications</text>

  <!-- Calendar -->
  <rect x="196" y="340" width="120" height="44" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="256" y="367" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333" text-anchor="middle">Calendar</text>

  <!-- Documents -->
  <rect x="332" y="340" width="120" height="44" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="392" y="367" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333" text-anchor="middle">Documents</text>

  <!-- Journal -->
  <rect x="468" y="340" width="120" height="44" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="528" y="367" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333" text-anchor="middle">Journal</text>

  <!-- Arrows from Profile to tabs -->
  <line x1="300" y1="298" x2="120" y2="338" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="330" y1="298" x2="256" y2="338" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="370" y1="298" x2="392" y2="338" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="298" x2="528" y2="338" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Calendar -> Journal link -->
  <path d="M 316,362 C 360,390 470,390 508,384" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <text x="412" y="400" font-family="system-ui, sans-serif" font-size="9" fill="#999">linked entry</text>

  <!-- Document Detail -->
  <rect x="332" y="420" width="120" height="44" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="392" y="439" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#333" text-anchor="middle">Document Detail</text>
  <text x="392" y="454" font-family="system-ui, sans-serif" font-size="10" fill="#888" text-anchor="middle">OCR + tags</text>
  <line x1="392" y1="384" x2="392" y2="418" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Actions from Profile Detail -->
  <!-- Call Tablet -->
  <rect x="60" y="440" width="120" height="44" rx="10" fill="#4A90D9" filter="url(#shadow)" opacity="0.85"/>
  <text x="120" y="467" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle">Call Tablet</text>

  <!-- Push Content -->
  <rect x="196" y="440" width="120" height="44" rx="10" fill="#5CB85C" filter="url(#shadow)" opacity="0.85"/>
  <text x="256" y="467" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle">Push Content</text>

  <!-- Arrows to actions -->
  <path d="M 290,298 C 220,320 120,400 120,438" fill="none" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <path d="M 310,298 C 260,330 256,400 256,438" fill="none" stroke="#5CB85C" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Devices section -->
  <!-- Arrow: Home -> Devices -->
  <line x1="430" y1="166" x2="498" y2="166" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="464" y="158" font-family="system-ui, sans-serif" font-size="10" fill="#4A90D9">nav</text>

  <rect x="500" y="140" width="120" height="52" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#4A90D9" stroke-width="2"/>
  <text x="560" y="163" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#333" text-anchor="middle">Devices</text>
  <text x="560" y="180" font-family="system-ui, sans-serif" font-size="10" fill="#888" text-anchor="middle">Management</text>

  <!-- Arrow: Devices -> Pair Tablet -->
  <line x1="560" y1="192" x2="560" y2="244" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="500" y="246" width="120" height="52" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#4A90D9" stroke-width="2"/>
  <text x="560" y="269" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#333" text-anchor="middle">Pair Tablet</text>
  <text x="560" y="286" font-family="system-ui, sans-serif" font-size="10" fill="#888" text-anchor="middle">QR scan flow</text>

  <!-- ========== TABLET KIOSK SECTION (Green) ========== -->
  <rect x="660" y="96" width="320" height="584" rx="12" fill="#E8F4E8" opacity="0.3"/>
  <text x="680" y="120" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#5CB85C" letter-spacing="1">TABLET KIOSK</text>

  <!-- QR Pairing -->
  <rect x="720" y="140" width="200" height="52" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#5CB85C" stroke-width="2"/>
  <text x="820" y="163" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#333" text-anchor="middle">QR Pairing Screen</text>
  <text x="820" y="180" font-family="system-ui, sans-serif" font-size="10" fill="#888" text-anchor="middle">Display QR for phone scan</text>

  <!-- Arrow: QR -> Kiosk Home -->
  <line x1="820" y1="192" x2="820" y2="244" stroke="#5CB85C" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="835" y="222" font-family="system-ui, sans-serif" font-size="10" fill="#5CB85C">paired</text>

  <!-- Kiosk Home -->
  <rect x="720" y="246" width="200" height="60" rx="10" fill="#5CB85C" filter="url(#shadow)"/>
  <text x="820" y="273" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Kiosk Home</text>
  <text x="820" y="292" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Greeting + contacts + schedule</text>

  <!-- Incoming Call -->
  <rect x="690" y="350" width="120" height="52" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#5CB85C" stroke-width="1.5"/>
  <text x="750" y="373" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333" text-anchor="middle">Incoming Call</text>
  <text x="750" y="390" font-family="system-ui, sans-serif" font-size="10" fill="#888" text-anchor="middle">Accept / Decline</text>

  <!-- Shared Content -->
  <rect x="830" y="350" width="120" height="52" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#5CB85C" stroke-width="1.5"/>
  <text x="890" y="373" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333" text-anchor="middle">Shared Content</text>
  <text x="890" y="390" font-family="system-ui, sans-serif" font-size="10" fill="#888" text-anchor="middle">Photos, docs</text>

  <!-- Arrows from Kiosk Home -->
  <line x1="790" y1="306" x2="750" y2="348" stroke="#5CB85C" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="850" y1="306" x2="890" y2="348" stroke="#5CB85C" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Cross-section connections -->
  <!-- Pair Tablet (mobile) -> QR Pairing (tablet) -->
  <path d="M 620,272 C 660,272 680,166 718,166" fill="none" stroke="#999" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowGray)"/>
  <rect x="642" y="196" width="60" height="20" rx="4" fill="#FAFAFA"/>
  <text x="672" y="210" font-family="system-ui, sans-serif" font-size="9" fill="#999" text-anchor="middle">scans QR</text>

  <!-- Call Tablet (mobile) -> Incoming Call (tablet) -->
  <path d="M 120,484 C 120,560 680,560 750,404" fill="none" stroke="#F0AD4E" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowGray)"/>
  <rect x="400" y="546" width="80" height="20" rx="4" fill="#FAFAFA"/>
  <text x="440" y="560" font-family="system-ui, sans-serif" font-size="9" fill="#F0AD4E" text-anchor="middle">initiates call</text>

  <!-- Push Content (mobile) -> Shared Content (tablet) -->
  <path d="M 256,484 C 256,530 830,530 890,404" fill="none" stroke="#F0AD4E" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowGray)"/>
  <rect x="554" y="510" width="88" height="20" rx="4" fill="#FAFAFA"/>
  <text x="598" y="524" font-family="system-ui, sans-serif" font-size="9" fill="#F0AD4E" text-anchor="middle">pushes content</text>

  <!-- Video Call view on tablet -->
  <rect x="690" y="430" width="120" height="44" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#5CB85C" stroke-width="1.5"/>
  <text x="750" y="457" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#333" text-anchor="middle">Video Call</text>
  <line x1="750" y1="402" x2="750" y2="428" stroke="#5CB85C" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="765" y="420" font-family="system-ui, sans-serif" font-size="9" fill="#5CB85C">accept</text>

  <!-- Footer note -->
  <text x="500" y="660" font-family="system-ui, sans-serif" font-size="12" fill="#AAA" text-anchor="middle">Dashed lines indicate cross-device communication (WebRTC / push notifications)</text>
  <text x="500" y="680" font-family="system-ui, sans-serif" font-size="12" fill="#AAA" text-anchor="middle">Solid lines indicate in-app navigation</text>
</svg>