<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 530" width="800" height="530">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="btnShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#2C3E50"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </radialGradient>
  </defs>

  <!-- Dark overlay background -->
  <rect width="800" height="530" fill="url(#bgGrad)" rx="16"/>

  <!-- Subtle rings animation hint -->
  <circle cx="400" cy="180" r="100" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  <circle cx="400" cy="180" r="130" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="2"/>
  <circle cx="400" cy="180" r="160" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="2"/>

  <!-- Caller photo -->
  <circle cx="400" cy="180" r="72" fill="rgba(74,144,217,0.3)"/>
  <circle cx="400" cy="180" r="64" fill="#E8F0FE"/>
  <text x="400" y="192" font-family="system-ui, sans-serif" font-size="56" text-anchor="middle">👨</text>

  <!-- Caller info -->
  <text x="400" y="296" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" text-anchor="middle">David is calling...</text>
  <text x="400" y="330" font-family="system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.6)" text-anchor="middle">Video Call</text>

  <!-- Accept button (huge green) -->
  <rect x="120" y="380" width="240" height="100" rx="20" fill="#5CB85C" filter="url(#btnShadow)"/>
  <!-- Phone icon circle -->
  <circle cx="180" cy="430" r="24" fill="rgba(255,255,255,0.2)"/>
  <text x="180" y="438" font-family="system-ui, sans-serif" font-size="24" text-anchor="middle" fill="#FFFFFF">&#9742;</text>
  <text x="280" y="424" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">Accept</text>
  <text x="280" y="450" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">Tap to answer</text>

  <!-- Decline button (huge red) -->
  <rect x="440" y="380" width="240" height="100" rx="20" fill="#D9534F" filter="url(#btnShadow)"/>
  <circle cx="500" cy="430" r="24" fill="rgba(255,255,255,0.2)"/>
  <text x="500" y="438" font-family="system-ui, sans-serif" font-size="24" text-anchor="middle" fill="#FFFFFF">&#9742;</text>
  <text x="600" y="424" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">Decline</text>
  <text x="600" y="450" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">Tap to ignore</text>
</svg>